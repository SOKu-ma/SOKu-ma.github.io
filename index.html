<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SO-KUMA Labs</title>
  <meta name="description" content="SO-KUMA Labs の公開サイトです。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3eb;
      --surface: #fffdf9;
      --text: #2c241f;
      --muted: #64584f;
      --line: #e4d9c9;
      --accent: #8a3f22;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(720px, calc(100% - 32px));
      margin: 48px auto;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.1;
    }

    p {
      margin: 12px 0 0;
      line-height: 1.8;
      color: var(--muted);
    }

    .accent {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="accent">SO-KUMA Labs</p>
    <h1>準備中です</h1>
    <p>公開サイトを整備中です。必要な情報は順次追加します。</p>
  </main>
</body>
</html>
